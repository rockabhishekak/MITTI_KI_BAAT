<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Mitti Ki Baat</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="images/logo5.png" type="image/png">

    <style>
        /* -------------------------------------------------------
           Styles specific to the Sign In / Sign Up page.
           These are written inline here to keep things simple.
        ------------------------------------------------------- */

        body {
            background: #e6f2e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Centre the card vertically in the remaining space */
        .auth-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 16px;
        }

        /* The white card that holds the form */
        .auth-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
        }

        .auth-card h2 {
            color: #1b5e20;
            margin-bottom: 6px;
            font-size: 26px;
        }

        .auth-card p.subtitle {
            color: #555;
            margin-bottom: 28px;
            font-size: 14px;
        }

        /* Tab buttons — "Sign In" and "Sign Up" */
        .tab-group {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            color: #888;
            transition: color 0.2s, border-bottom 0.2s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: #1b5e20;
            border-bottom: 3px solid #1b5e20;
        }

        /* Form sections — only the active one is visible */
        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        /* Individual form field group */
        .field-group {
            margin-bottom: 18px;
        }

        .field-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-bottom: 6px;
        }

        .field-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field-group input:focus {
            border-color: #1b5e20;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 11px;
            background: #1b5e20;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }

        .submit-btn:hover {
            background: #145218;
        }

        .submit-btn:disabled {
            background: #888;
            cursor: not-allowed;
        }

        /* Message box — shows success or error feedback */
        .message-box {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 14px;
            display: none;
        }

        .message-box.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
            display: block;
        }

        .message-box.error {
            background: #fdecea;
            color: #c62828;
            border: 1px solid #ef9a9a;
            display: block;
        }
    </style>
</head>

<body>

    <!-- Navigation Bar (same as other pages) -->
    <nav class="navbar">
        <div class="logo">
            <img src="images/logo3.png" alt="Logo">
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="identify.html">Identify Pest</a></li>
            <li><a href="crops.html">Crops</a></li>
            <li><a href="advisory.html">Advisory</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <!-- Show "Back to Home" instead of "Sign In" on this page -->
        <button class="btn" onclick="window.location.href='index.html'">← Home</button>
    </nav>


    <!-- Main auth section -->
    <div class="auth-wrapper">
        <div class="auth-card">

            <h2>Mitti Ki Baat 🌱</h2>
            <p class="subtitle">Sign in to your account or create a new one</p>

            <!-- Tab Buttons -->
            <div class="tab-group">
                <button class="tab-btn active" id="signinTab" onclick="switchTab('signin')">Sign In</button>
                <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            </div>


            <!-- =============================================
                 SIGN IN FORM
            ============================================== -->
            <div class="form-section active" id="signinSection">
                <form id="signinForm">

                    <div class="field-group">
                        <label for="signinEmail">Email Address</label>
                        <input type="email" id="signinEmail" placeholder="you@example.com" required>
                    </div>

                    <div class="field-group">
                        <label for="signinPassword">Password</label>
                        <input type="password" id="signinPassword" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="submit-btn" id="signinBtn">Sign In</button>

                </form>

                <!-- This box will show success or error messages after form submit -->
                <div class="message-box" id="signinMessage"></div>
            </div>


            <!-- =============================================
                 SIGN UP FORM
            ============================================== -->
            <div class="form-section" id="signupSection">
                <form id="signupForm">

                    <div class="field-group">
                        <label for="signupUsername">Username</label>
                        <input type="text" id="signupUsername" placeholder="Choose a username" required>
                    </div>

                    <div class="field-group">
                        <label for="signupEmail">Email Address</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    </div>

                    <div class="field-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="At least 6 characters" required>
                    </div>

                    <button type="submit" class="submit-btn" id="signupBtn">Create Account</button>

                </form>

                <div class="message-box" id="signupMessage"></div>
            </div>

        </div>
    </div>


    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left">
                <h3>Mitti Ki Baat</h3>
                <p>© 2026 Mitti Ki Baat. Academic Project</p>
            </div>
            <div class="footer-links">
                <a href="#">Institutional Repository</a>
                <a href="#">Research Ethics</a>
                <a href="#">Terms of Use</a>
                <a href="#">Privacy Policy</a>
            </div>
        </div>
    </footer>


    <script>
        // ============================================================
        //   signin.html — Frontend JavaScript
        //
        //   This script talks to the Node.js backend API.
        //
        //   IMPORTANT: The backend server must be running first!
        //   Start it with:  cd backend && npm start
        //
        //   The API_URL below must match where your backend is running.
        //   If you are running locally, keep it as http://localhost:5000
        // ============================================================

        // Change this URL if your backend runs on a different port or host
        const API_URL = "http://localhost:5000/api/auth";


        // ----------------------------------------------------------
        //   Tab switching — toggles between Sign In and Sign Up
        // ----------------------------------------------------------
        function switchTab(tab) {

            // Update tab button styles
            document.getElementById("signinTab").classList.toggle("active", tab === "signin");
            document.getElementById("signupTab").classList.toggle("active", tab === "signup");

            // Show / hide the correct form section
            document.getElementById("signinSection").classList.toggle("active", tab === "signin");
            document.getElementById("signupSection").classList.toggle("active", tab === "signup");

        }


        // ----------------------------------------------------------
        //   Show a feedback message below the form
        //   type: "success" or "error"
        // ----------------------------------------------------------
        function showMessage(elementId, message, type) {
            const box = document.getElementById(elementId);
            box.textContent = message;
            box.className = "message-box " + type;
        }


        // ----------------------------------------------------------
        //   SIGN IN — form submission handler
        // ----------------------------------------------------------
        document.getElementById("signinForm").addEventListener("submit", async function (e) {

            // Prevent the page from refreshing (default form behaviour)
            e.preventDefault();

            const email = document.getElementById("signinEmail").value.trim();
            const password = document.getElementById("signinPassword").value;
            const btn = document.getElementById("signinBtn");

            // Disable button to prevent double-submission
            btn.disabled = true;
            btn.textContent = "Signing in…";

            try {

                // Send a POST request to the backend signin route
                // fetch() is the modern way to make HTTP requests from the browser
                const response = await fetch(`${API_URL}/signin`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                // Parse the JSON response from the server
                const data = await response.json();

                if (response.ok) {

                    // Save the JWT token in localStorage so we can use it later
                    // to access protected routes (like /api/auth/profile)
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("username", data.user.username);

                    showMessage("signinMessage", `Welcome back, ${data.user.username}! Redirecting…`, "success");

                    // Redirect to the home page after 1.5 seconds
                    setTimeout(() => { window.location.href = "index.html"; }, 1500);

                } else {
                    // Show the error message returned by the server
                    showMessage("signinMessage", data.message || "Sign in failed", "error");
                }

            } catch (err) {
                // Network error — backend is probably not running
                showMessage(
                    "signinMessage",
                    "Cannot connect to the server. Make sure the backend is running (cd backend && npm start)",
                    "error"
                );
            }

            // Re-enable button
            btn.disabled = false;
            btn.textContent = "Sign In";

        });


        // ----------------------------------------------------------
        //   SIGN UP — form submission handler
        // ----------------------------------------------------------
        document.getElementById("signupForm").addEventListener("submit", async function (e) {

            e.preventDefault();

            const username = document.getElementById("signupUsername").value.trim();
            const email = document.getElementById("signupEmail").value.trim();
            const password = document.getElementById("signupPassword").value;
            const btn = document.getElementById("signupBtn");

            btn.disabled = true;
            btn.textContent = "Creating account…";

            try {

                // Send a POST request to the backend signup route
                const response = await fetch(`${API_URL}/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {

                    showMessage("signupMessage", "Account created! Switching to Sign In…", "success");

                    // Auto-switch to the Sign In tab after 1.5 seconds
                    setTimeout(() => {
                        switchTab("signin");
                        document.getElementById("signinEmail").value = email;
                    }, 1500);

                } else {
                    showMessage("signupMessage", data.message || "Sign up failed", "error");
                }

            } catch (err) {
                showMessage(
                    "signupMessage",
                    "Cannot connect to the server. Make sure the backend is running (cd backend && npm start)",
                    "error"
                );
            }

            btn.disabled = false;
            btn.textContent = "Create Account";

        });

    </script>

</body>

</html>
